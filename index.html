const STORE_KEY = "cadence:data:v1";
async function loadData() {
  try { if (typeof window !== "undefined" && window.storage) { const r = await window.storage.get(STORE_KEY); if (r && r.value) return JSON.parse(r.value); } } catch (e) {}
  try { if (typeof localStorage !== "undefined") { const raw = localStorage.getItem(STORE_KEY); if (raw) return JSON.parse(raw); } } catch (e) {}
  return null;
}
async function saveData(d) {
  try { if (typeof window !== "undefined" && window.storage) { await window.storage.set(STORE_KEY, JSON.stringify(d)); return; } } catch (e) {}
  try { if (typeof localStorage !== "undefined") localStorage.setItem(STORE_KEY, JSON.stringify(d)); } catch (e) {}
}

function fmt12(t) {

function tzOffsetMinutes(date, timeZone) {
  try {
    const dtf = new Intl.DateTimeFormat("en-US", { timeZone, hourCycle: "h23", year: "numeric", month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit", second: "2-digit" });
    const parts = dtf.formatToParts(date).reduce((acc, p) => { acc[p.type] = p.value; return acc; }, {});
    const asUTC = Date.UTC(Number(parts.year), Number(parts.month) - 1, Number(parts.day), Number(parts.hour), Number(parts.minute), Number(parts.second));
    return (asUTC - date.getTime()) / 60000;
  } catch (e) { return 0; }
}
// Converts a date+"HH:MM" understood to be in fromTz into the equivalent HH:MM in toTz
function convertTime(dateIso, timeHHMM, fromTz, toTz) {
  if (!timeHHMM) return null;
  const [hh, mm] = timeHHMM.split(":").map(Number);
  const anchor = new Date(dateIso + "T" + timeHHMM + ":00Z");
  const diff = tzOffsetMinutes(anchor, toTz) - tzOffsetMinutes(anchor, fromTz);
  const total = hh * 60 + mm + diff;
  const norm = ((total % 1440) + 1440) % 1440;
  const dayShift = Math.floor(total / 1440);
  return { hhmm: `${String(Math.floor(norm / 60)).padStart(2, "0")}:${String(norm % 60).padStart(2, "0")}`, dayShift };
}

// monthly capacity: count weekday "out" days within the current calendar month
function workingDaysInMonth(year, month) {
  let days = 0; const last = new Date(year, month + 1, 0).getDate();
  for (let d = 1; d <= last; d++) { const dow = new Date(year, month, d).getDay(); if (dow !== 0 && dow !== 6) days++; }
  return days;
}
const CURRENT_WORKING_DAYS = workingDaysInMonth(today.getFullYear(), today.getMonth());
function outDaysThisMonth(memberId, availability) {
  let n = 0; const y = today.getFullYear(), mo = today.getMonth(); const last = new Date(y, mo + 1, 0).getDate();
  for (let d = 1; d <= last; d++) {
    const dt = new Date(y, mo, d); const dow = dt.getDay(); if (dow === 0 || dow === 6) continue;
    const iso = isoOf(dt);
    if (availability.some((a) => a.memberId === memberId && a.type === "out" && a.start <= iso && a.end >= iso)) n++;
  }
  return n;
}
const effectiveCap = (p, availability) => Math.max(1, Math.round(p.capacity * Math.max(0, CURRENT_WORKING_DAYS - Math.min(CURRENT_WORKING_DAYS, outDaysThisMonth(p.id, availability))) / CURRENT_WORKING_DAYS));

// per-member pay breakdown: hours + pay from assignments (their share of logged hours) and events (full meeting duration)
function memberPayBreakdown(memberId, data) {
  const items = [];
  let hoursAll = 0, hoursMonth = 0;
  data.assignments.forEach((a) => {
    if (!(a.assigneeIds || []).includes(memberId)) return;
    const hAll = memberShareHours(a, memberId, a.logged || 0);
    const hMonth = memberShareHours(a, memberId, (a.loggedByMonth || {})[CURRENT_MONTH] || 0);
    if (hAll > 0 || hMonth > 0) items.push({ kind: "assignment", id: a.id, label: a.title, sub: a.internal ? "Firm" : (data.clients.find((c) => c.id === a.clientId)?.name || "—"), hoursAll: hAll, hoursMonth: hMonth });
    hoursAll += hAll; hoursMonth += hMonth;
  });
  data.events.forEach((e) => {
    if (!(e.memberIds || []).includes(memberId)) return;
    const dur = Number(e.durationHours) || 0;
    if (dur <= 0) return;
    const inMonth = e.date && e.date.slice(0, 7) === CURRENT_MONTH;
    items.push({ kind: "event", id: e.id, label: e.title, sub: e.clientId ? (data.clients.find((c) => c.id === e.clientId)?.name || "—") : "Firm", hoursAll: dur, hoursMonth: inMonth ? dur : 0 });
    hoursAll += dur; if (inMonth) hoursMonth += dur;
  });
  const rate = data.team.find((m) => m.id === memberId)?.rate || 0;
  return { items, hoursAll, hoursMonth, payAll: hoursAll * rate, payMonth: hoursMonth * rate, rate };
}

  { view: "bandwidth", title: "Bandwidth & skills", body: "Customize thresholds and monthly capacity, find people by skill, and see PTO automatically reduce someone's available hours." },
  { view: "calendar", title: "Calendars & recurrence", body: "Individual or team views, blocked availability, time zone conversion for clients, and events that repeat." },
  { view: "financials", title: "Financials (admin)", body: "Revenue by client and service line, plus each team member's hours and expected pay. Rates stay private to each person and admins." },
  { view: "marketing", title: "Marketing & brand", body: "Internal work, social channels, and the firm website — kept separate from client engagements." },
];

/* ================================================================== */
function App() {
  const [data, setData] = useState(null);
  const [view, setView] = useState("dashboard");
  const [hideConf, setHideConf] = useState(false);
  const [modal, setModal] = useState(null);
  const [tour, setTour] = useState(-1);
  const [currentUser, setCurrentUser] = useState({ role: "admin", memberId: null });
  const [notifOpen, setNotifOpen] = useState(false);

  useEffect(() => { let on = true; loadData().then((d) => { if (on) setData(migrate(d) || seed()); }); return () => { on = false; }; }, []);
  useEffect(() => { if (data) saveData(data); }, [data]);
  useEffect(() => { if (tour >= 0 && tour < TOUR.length) setView(TOUR[tour].view); }, [tour]);

  const update = (patch) => setData((d) => ({ ...d, ...patch }));
  const clientName = (id) => data?.clients.find((c) => c.id === id)?.name || "—";
  const member = (id) => data?.team.find((m) => m.id === id);
  const clientLabel = (a) => (a.internal ? "Firm" : clientName(a.clientId));
  const isAdmin = currentUser.role === "admin";
  const canSeeRate = (pid) => isAdmin || currentUser.memberId === pid;

  const load = useMemo(() => {
    if (!data) return {};
    const m = {}; data.team.forEach((p) => (m[p.id] = 0));
    const counts = data.settings.countStatuses;
    data.assignments.forEach((a) => { if (!counts.includes(a.status)) return; (a.assigneeIds || []).forEach((id) => { const hrs = a.alloc && a.alloc[id] != null ? a.alloc[id] : (a.weekly || 0) / (a.assigneeIds.length || 1); if (m[id] != null) m[id] += Number(hrs) || 0; }); });
    return m;
  }, [data]);

  if (!data) return <div style={{ padding: 40, fontFamily: "Inter, sans-serif", color: "#69736D" }}>Loading…</div>;

  const saveAssignment = (a) => setData((d) => { const ex = d.assignments.some((x) => x.id === a.id); return { ...d, assignments: ex ? d.assignments.map((x) => (x.id === a.id ? a : x)) : [a, ...d.assignments] }; });
  const delAssignment = (id) => setData((d) => ({ ...d, assignments: d.assignments.filter((x) => x.id !== id) }));
  const approve = (id) => setData((d) => ({ ...d, assignments: d.assignments.map((a) => (a.id === id ? { ...a, approval: { ...(a.approval || {}), status: "Approved" } } : a)) }));
  const saveEvent = (e) => setData((d) => { const ex = d.events.some((x) => x.id === e.id); return { ...d, events: ex ? d.events.map((x) => (x.id === e.id ? e : x)) : [...d.events, e] }; });
  const delEvent = (id) => setData((d) => ({ ...d, events: d.events.filter((x) => x.id !== id) }));
  const saveAvail = (a) => setData((d) => { const ex = d.availability.some((x) => x.id === a.id); return { ...d, availability: ex ? d.availability.map((x) => (x.id === a.id ? a : x)) : [...d.availability, a] }; });
  const delAvail = (id) => setData((d) => ({ ...d, availability: d.availability.filter((x) => x.id !== id) }));
  const saveClient = (c) => setData((d) => { const ex = d.clients.some((x) => x.id === c.id); return { ...d, clients: ex ? d.clients.map((x) => (x.id === c.id ? c : x)) : [...d.clients, c] }; });
  const saveMember = (m) => setData((d) => { const ex = d.team.some((x) => x.id === m.id); return { ...d, team: ex ? d.team.map((x) => (x.id === m.id ? m : x)) : [...d.team, m] }; });
  const setCap = (id, cap) => setData((d) => ({ ...d, team: d.team.map((m) => (m.id === id ? { ...m, capacity: cap } : m)) }));
  const logTime = (id, hrs) => setData((d) => ({ ...d, assignments: d.assignments.map((a) => { if (a.id !== id) return a; const lbm = { ...(a.loggedByMonth || {}) }; lbm[CURRENT_MONTH] = Math.max(0, (lbm[CURRENT_MONTH] || 0) + hrs); return { ...a, logged: Math.max(0, Number(a.logged || 0) + hrs), loggedByMonth: lbm }; }) }));
  const saveChannel = (c) => setData((d) => ({ ...d, channels: [...d.channels, c] }));
  const delChannel = (id) => setData((d) => ({ ...d, channels: d.channels.filter((x) => x.id !== id) }));
  const importData = (obj) => setData(migrate(obj));
  const resetFresh = () => setData((d) => ({ ...d, clients: [], assignments: [], events: [], availability: [], channels: [], notifications: [], payouts: [] }));
  const restoreSample = () => setData(seed());

  const postComment = (assignmentId, comment) => setData((d) => {
    const target = d.assignments.find((x) => x.id === assignmentId);
    const assignments = d.assignments.map((x) => (x.id === assignmentId ? { ...x, comments: [...(x.comments || []), comment] } : x));
    const notifs = (comment.mentions || []).filter((id) => id !== comment.authorId).map((id) => ({ id: uid(), toMemberId: id, type: "mention", assignmentId, text: `${comment.authorLabel} tagged you on "${target ? target.title : "an assignment"}"`, date: new Date().toISOString(), read: false }));
    return { ...d, assignments, notifications: [...d.notifications, ...notifs] };
  });
  const notifyReviewer = (assignmentId, reviewerId, title) => { if (!reviewerId) return; setData((d) => ({ ...d, notifications: [...d.notifications, { id: uid(), toMemberId: reviewerId, type: "review", assignmentId, text: `"${title}" needs your review`, date: new Date().toISOString(), read: false }] })); };
  const markNotifRead = (id) => setData((d) => ({ ...d, notifications: d.notifications.map((n) => (n.id === id ? { ...n, read: true } : n)) }));
  const recordPayout = (memberId, period, hours, amount) => setData((d) => ({ ...d, payouts: [{ id: uid(), memberId, period, hours, amount, date: todayIso }, ...d.payouts] }));
  const delPayout = (id) => setData((d) => ({ ...d, payouts: d.payouts.filter((p) => p.id !== id) }));
  const openNotification = (n) => { markNotifRead(n.id); const a = data.assignments.find((x) => x.id === n.assignmentId); if (a) { setView(a.internal ? "marketing" : "assignments"); setModal({ type: "assignment", payload: a }); } setNotifOpen(false); };

  const myUnread = !isAdmin && currentUser.memberId ? data.notifications.filter((n) => n.toMemberId === currentUser.memberId && !n.read).length : data.notifications.filter((n) => !n.read).length;

  const s = { data, clientName, clientLabel, member, load, setModal, hideConf, setView, update, currentUser, isAdmin, canSeeRate, saveAssignment, delAssignment, approve, saveEvent, delEvent, saveAvail, delAvail, saveClient, setCap, logTime, saveChannel, delChannel, postComment, notifyReviewer, markNotifRead, recordPayout, delPayout };

  return (
    <div className="cd-root">
      <style>{CSS}</style>
      <aside className="cd-side">
        <div className="cd-brand"><span className="cd-logo">Cadence</span><span className="cd-firm">{data.firmName}</span></div>
        <nav className="cd-nav">{NAV.map((n) => { const I = n.icon; const locked = n.admin && !isAdmin; return <button key={n.id} className={"cd-navbtn" + (view === n.id ? " on" : "") + (locked ? " locked" : "")} onClick={() => setView(n.id)}><I size={17} strokeWidth={1.9} /><span>{n.label}</span>{locked && <Lock size={12} className="cd-navlock" />}</button>; })}</nav>
        <div className="cd-side-foot">
          <select className="cd-roleswitch" value={isAdmin ? "admin" : currentUser.memberId} onChange={(e) => setCurrentUser(e.target.value === "admin" ? { role: "admin", memberId: null } : { role: "member", memberId: e.target.value })}>
            <option value="admin">Viewing as: Admin</option>
            {data.team.map((m) => <option key={m.id} value={m.id}>Viewing as: {m.name}</option>)}
          </select>
          {!isAdmin && currentUser.memberId && member(currentUser.memberId) && <button className="cd-profile-btn" onClick={() => setModal({ type: "member", payload: member(currentUser.memberId) })}><User size={15} />My profile &amp; rate</button>}
          {!isAdmin && currentUser.memberId && <button className="cd-profile-btn" onClick={() => setModal({ type: "mypay", payload: currentUser.memberId })}><Wallet size={15} />My pay</button>}
          <button className="cd-conf-toggle cd-bell-btn" onClick={() => setNotifOpen((v) => !v)}><Bell size={15} />Notifications{myUnread > 0 && <span className="cd-bell-badge">{myUnread}</span>}</button>
          <button className="cd-conf-toggle" onClick={() => setHideConf((v) => !v)}>{hideConf ? <EyeOff size={15} /> : <Eye size={15} />}{hideConf ? "Confidential hidden" : "Confidential visible"}</button>
          <button className="cd-tour-btn" onClick={() => setTour(0)}><Sparkles size={15} />Take a tour</button>
          <button className="cd-conf-toggle" onClick={() => setModal({ type: "data" })}><Database size={15} />Data &amp; backup</button>
        </div>
      </aside>

      <main className="cd-main">
        {view === "dashboard" && <Dashboard {...s} />}
        {view === "assignments" && <Assignments {...s} />}
        {view === "bandwidth" && <Bandwidth {...s} />}
        {view === "calendar" && <CalendarView {...s} />}
        {view === "marketing" && <Marketing {...s} />}
        {view === "financials" && (isAdmin ? <Financials {...s} /> : <FinancialsLocked onUnlock={() => setCurrentUser({ role: "admin", memberId: null })} />)}
        {view === "clients" && <Clients {...s} />}
        {view === "templates" && <Templates {...s} />}
        <footer className="cd-foot">Prototype. Your data is saved to this browser only — each visitor has their own private copy, not a shared one. The “Viewing as” switch demonstrates who sees rates and Financials; real per-user enforcement, audit logging, billing sync, and Google/Calendar sync arrive with the deployable version.</footer>
      </main>

      {modal && <Modals modal={modal} {...s} saveMember={saveMember} importData={importData} resetFresh={resetFresh} restoreSample={restoreSample} />}
      {notifOpen && <NotificationsPanel notifications={data.notifications} isAdmin={isAdmin} currentUser={currentUser} member={member} onOpen={openNotification} onClose={() => setNotifOpen(false)} />}
      {tour >= 0 && <Tour i={tour} setTour={setTour} isAdmin={isAdmin} />}
    </div>
  );
}

/* ---------- bits ---------- */
function Tag({ children, tone = "neutral" }) { return <span className={"cd-tag " + tone}>{children}</span>; }
function StatusPill({ s }) { const t = s === "Done" ? "ok" : s === "Blocked" ? "alert" : s === "Send Back" ? "sendback" : s === "Review" ? "amber" : s === "In progress" ? "brand" : "neutral"; return <span className={"cd-pill " + t}><CircleDot size={11} strokeWidth={2.4} />{s}</span>; }
function Bar({ ratio, tone }) { return <div className="cd-bar"><div className={"cd-bar-fill " + tone} style={{ width: Math.min(100, ratio * 100) + "%" }} /></div>; }
function PageHead({ title, sub, action }) { return <div className="cd-head"><div><h1 className="cd-h1">{title}</h1>{sub && <p className="cd-sub">{sub}</p>}</div>{action}</div>; }
function NotificationsPanel({ notifications, isAdmin, currentUser, member, onOpen, onClose }) {
  const list = (isAdmin ? notifications : notifications.filter((n) => n.toMemberId === currentUser.memberId)).slice().sort((a, b) => b.date.localeCompare(a.date));
  return (
    <div className="cd-notif-panel">
      <div className="cd-notif-head"><span>Notifications</span><button className="cd-iconbtn" onClick={onClose}><X size={15} /></button></div>
      <div className="cd-notif-list">
        {list.length === 0 && <p className="cd-empty pad">{isAdmin ? "No notifications yet." : "Nothing tagged to you yet."}</p>}
        {list.map((n) => (
          <div key={n.id} className={"cd-notif-row" + (n.read ? "" : " unread")} onClick={() => onOpen(n)}>
            <div className={"cd-notif-ic " + n.type}>{n.type === "review" ? <ShieldCheck size={13} /> : <AtSign size={13} />}</div>
            <div className="cd-notif-main">
              {isAdmin && <div className="cd-notif-to">To {member(n.toMemberId)?.name || "—"}</div>}
              <div className="cd-notif-text">{n.text}</div>
              <div className="cd-notif-date">{new Date(n.date).toLocaleDateString(undefined, { month: "short", day: "numeric" })}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ---------- Dashboard ---------- */
function Dashboard({ data, load, clientLabel, member, hideConf, setView, setModal }) {
  const amber = data.settings.amberThreshold;
  const active = data.assignments.filter((a) => a.status !== "Done");
  const dueWeek = active.filter((a) => { const d = daysUntil(a.due); return d != null && d <= 7 && d >= 0; });
  const over = data.team.filter((p) => (load[p.id] || 0) > effectiveCap(p, data.availability));
  const conf = data.assignments.filter((a) => a.confidential && a.status !== "Done");
  const pending = active.filter((a) => a.approval && a.approval.status === "Pending");
  const upcoming = [...data.events].filter((e) => daysUntil(e.date) >= 0).sort((a, b) => (a.date + a.time).localeCompare(b.date + b.time)).slice(0, 4);
  const renewals = data.clients.filter((c) => c.retainerRenewal && daysUntil(c.retainerRenewal) >= 0 && daysUntil(c.retainerRenewal) <= 30);
  const Stat = ({ n, label, tone }) => <div className="cd-stat"><div className={"cd-stat-n " + (tone || "")}>{n}</div><div className="cd-stat-l">{label}</div></div>;
  return (
    <>
      <PageHead title="Dashboard" sub="Where the work stands today." action={<button className="cd-btn primary" onClick={() => setModal({ type: "assignment", payload: null })}><Plus size={16} />New assignment</button>} />
      {(renewals.length > 0 || pending.length > 0) && <div className="cd-alerts">
        {renewals.map((c) => <span key={c.id} className="cd-alertchip renew"><Building2 size={13} />Retainer renewal: {c.name} ({daysUntil(c.retainerRenewal)}d)</span>)}
        {pending.length > 0 && <span className="cd-alertchip approve" onClick={() => setView("assignments")}><ShieldCheck size={13} />{pending.length} awaiting partner approval</span>}
      </div>}
      <div className="cd-stats"><Stat n={active.length} label="Active assignments" /><Stat n={dueWeek.length} label="Due this week" tone={dueWeek.length ? "amber" : ""} /><Stat n={over.length} label="Over capacity" tone={over.length ? "alert" : "ok"} /><Stat n={conf.length} label="Confidential open" tone={conf.length ? "plum" : ""} /></div>
      <div className="cd-grid2">
        <section className="cd-card">
          <div className="cd-card-h"><h2 className="cd-h2">Bandwidth check</h2><button className="cd-link" onClick={() => setView("bandwidth")}>Open <ChevronRight size={14} /></button></div>
          {data.team.map((p) => { const cap = effectiveCap(p, data.availability); const used = load[p.id] || 0; const r = used / cap; return <div key={p.id} className="cd-band-row"><div className="cd-band-name">{p.name.split(" ")[0]}</div><Bar ratio={r} tone={utilColor(r, amber)} /><div className={"cd-band-val " + utilColor(r, amber)}>{Math.round(used)}/{cap}h</div></div>; })}
        </section>
        <section className="cd-card">
          <div className="cd-card-h"><h2 className="cd-h2">Coming up</h2><button className="cd-link" onClick={() => setView("calendar")}>Calendar <ChevronRight size={14} /></button></div>
          {upcoming.length === 0 && <p className="cd-empty">Nothing scheduled.</p>}
          {upcoming.map((e) => <div key={e.id} className="cd-up-row"><div className="cd-up-date">{fmtDate(e.date)}<span>{fmt12(e.time)}</span></div><div className="cd-up-main"><div className="cd-up-title">{e.title}{e.recurrence && e.recurrence !== "none" && <Repeat size={11} className="cd-rep" />}</div><div className="cd-up-meta">{e.clientId ? clientLabel({ clientId: e.clientId }) : "Firm"} · {e.type}</div></div></div>)}
        </section>
      </div>
      <section className="cd-card">
        <div className="cd-card-h"><h2 className="cd-h2">Due this week</h2></div>
        {dueWeek.length === 0 && <p className="cd-empty">Nothing due in the next seven days.</p>}
        {dueWeek.sort((a, b) => a.due.localeCompare(b.due)).map((a) => <div key={a.id} className="cd-due-row" onClick={() => setModal({ type: "assignment", payload: a })}><span className="cd-due-when">{daysUntil(a.due) === 0 ? "Today" : daysUntil(a.due) + "d"}</span><span className="cd-due-title">{a.confidential && <Lock size={12} className="cd-lock" />}{maskTitle(a, hideConf)}</span><Tag>{a.serviceLine}</Tag><span className="cd-due-who">{whoNames(a, member)}</span></div>)}
      </section>
    </>
  );
}

/* ---------- Assignments ---------- */
function Assignments({ data, clientLabel, member, hideConf, setModal, logTime, internalOnly, isAdmin, approve }) {
  const [fClient, setFClient] = useState("all");
  const [fLine, setFLine] = useState("all");
  const [fStatus, setFStatus] = useState("active");
  const rows = data.assignments.filter((a) => {
    if (internalOnly && !a.internal) return false;
    if (fClient === "internal" && !a.internal) return false;
    if (fClient !== "all" && fClient !== "internal" && a.clientId !== fClient) return false;
    if (fLine !== "all" && a.serviceLine !== fLine) return false;
    if (fStatus === "active" && a.status === "Done") return false;
    if (fStatus !== "active" && fStatus !== "all" && a.status !== fStatus) return false;
    return true;
  });
  return (
    <>
      {!internalOnly && <PageHead title="Assignments" sub="Filter by client or type of work. Assignments can be shared across people." action={<button className="cd-btn primary" onClick={() => setModal({ type: "assignment", payload: null })}><Plus size={16} />New assignment</button>} />}
      {!internalOnly && <div className="cd-filters"><select value={fClient} onChange={(e) => setFClient(e.target.value)}><option value="all">All clients</option><option value="internal">Firm (internal)</option>{data.clients.map((c) => <option key={c.id} value={c.id}>{c.name}</option>)}</select><select value={fLine} onChange={(e) => setFLine(e.target.value)}><option value="all">All service lines</option>{SERVICE_LINES.map((x) => <option key={x} value={x}>{x}</option>)}</select><select value={fStatus} onChange={(e) => setFStatus(e.target.value)}><option value="active">Active</option><option value="all">All statuses</option>{STATUSES.map((x) => <option key={x} value={x}>{x}</option>)}</select></div>}
      <div className="cd-alist">
        {rows.length === 0 && <p className="cd-empty pad">No assignments match.</p>}
        {rows.map((a) => { const r = (a.logged || 0) / (a.budget || 1); const od = daysUntil(a.due); const joint = (a.assigneeIds || []).length > 1; const ap = a.approval; return (
          <div key={a.id} className={"cd-acard" + (a.confidential ? " conf" : "")}>
            <div className="cd-acard-top"><div className="cd-acard-title">{a.confidential && <Lock size={13} className="cd-lock" />}{maskTitle(a, hideConf)}</div><StatusPill s={a.status} /></div>
            <div className="cd-acard-meta">
              <Tag tone={a.internal ? "plumlt" : "brandlt"}>{clientLabel(a)}</Tag><Tag>{a.serviceLine}</Tag>
              <span className="cd-meta-who">{joint ? <UserPlus size={13} /> : <Users size={13} />}{whoNames(a, member)}</span>
              <span className={"cd-meta-due" + (od != null && od < 0 && a.status !== "Done" ? " late" : "")}><Calendar size={13} />{fmtDate(a.due)}</span>
              {(a.tasks || []).length > 0 && <span className="cd-tasks-chip"><Check size={12} />{a.tasks.filter((t) => t.done).length}/{a.tasks.length}</span>}
              {a.reviewerId && <span className="cd-tasks-chip reviewer"><ShieldCheck size={12} />{member(a.reviewerId)?.name.split(" ")[0] || "Reviewer"}</span>}
              {(a.links || []).length > 0 && <span className="cd-tasks-chip"><Link2 size={12} />{a.links.length}</span>}
              {(a.comments || []).length > 0 && <span className="cd-tasks-chip"><AtSign size={12} />{a.comments.length}</span>}
            </div>
            {ap && <div className="cd-approval"><span className={"cd-pill " + (ap.status === "Approved" ? "ok" : "amber")}><ShieldCheck size={11} />{ap.status === "Approved" ? "Approved" : "Awaiting partner approval"}</span>{ap.status !== "Approved" && isAdmin && <button className="cd-btn ghost sm" onClick={() => approve(a.id)}>Approve</button>}</div>}
            <div className="cd-acard-time"><div className="cd-time-bar"><Bar ratio={r} tone={r > 1 ? "alert" : "brand"} /></div><span className="cd-time-val">{a.logged || 0}/{a.budget || 0}h</span><div className="cd-acard-actions"><button className="cd-iconbtn" title="Log 1h" onClick={() => logTime(a.id, 1)}><Clock size={15} />+1h</button><button className="cd-iconbtn" onClick={() => setModal({ type: "assignment", payload: a })}><Pencil size={15} /></button></div></div>
          </div>
        ); })}
      </div>
    </>
  );
}

/* ---------- Bandwidth ---------- */
function Bandwidth({ data, load, hideConf, setModal, setCap, update, canSeeRate }) {
  const [showSettings, setShowSettings] = useState(false);
  const [skill, setSkill] = useState("all");
  const amber = data.settings.amberThreshold;
  const toggleStatus = (st) => { const cur = data.settings.countStatuses; update({ settings: { ...data.settings, countStatuses: cur.includes(st) ? cur.filter((x) => x !== st) : [...cur, st] } }); };
  let team = [...data.team];
  if (skill !== "all") team = team.filter((p) => (p.skills || []).includes(skill));
  team.sort((a, b) => (load[a.id] || 0) / effectiveCap(a, data.availability) - (load[b.id] || 0) / effectiveCap(b, data.availability));
  const sorted = skill === "all" ? [...team].sort((a, b) => (load[b.id] || 0) / effectiveCap(b, data.availability) - (load[a.id] || 0) / effectiveCap(a, data.availability)) : team;
  return (
    <>
      <PageHead title="Team & bandwidth" sub="Monthly load versus capacity. PTO automatically lowers available hours." action={<div className="cd-head-actions"><button className="cd-btn ghost" onClick={() => setShowSettings((v) => !v)}><Settings size={15} />Customize</button><button className="cd-btn ghost" onClick={() => setModal({ type: "member", payload: null })}><Plus size={16} />Add person</button></div>} />
      {showSettings && <div className="cd-card cd-settings">
        <div className="cd-set-row"><div><div className="cd-set-label">Near-capacity threshold</div><div className="cd-set-hint">Bars turn amber here, alert above 100%.</div></div><div className="cd-set-slider"><input type="range" min="60" max="98" value={Math.round(amber * 100)} onChange={(e) => update({ settings: { ...data.settings, amberThreshold: Number(e.target.value) / 100 } })} /><b>{Math.round(amber * 100)}%</b></div></div>
        <div className="cd-set-row"><div><div className="cd-set-label">Count toward load</div><div className="cd-set-hint">Which statuses add to monthly hours.</div></div><div className="cd-set-checks">{STATUSES.filter((x) => x !== "Done").map((st) => <label key={st} className={"cd-tagcheck" + (data.settings.countStatuses.includes(st) ? " on" : "")}><input type="checkbox" checked={data.settings.countStatuses.includes(st)} onChange={() => toggleStatus(st)} />{st}</label>)}</div></div>
      </div>}

/* ---------- Calendar ---------- */
function CalendarView({ data, member, setModal, update }) {
  const [cursor, setCursor] = useState(() => new Date(today.getFullYear(), today.getMonth(), 1));
  const [filter, setFilter] = useState("all");
  const firmTz = data.settings.firmTimezone || "America/New_York";
  const y = cursor.getFullYear(), mo = cursor.getMonth();
  const startDow = new Date(y, mo, 1).getDay();
  const gridStart = new Date(y, mo, 1 - startDow);
  const cells = [...Array(42)].map((_, i) => new Date(gridStart.getFullYear(), gridStart.getMonth(), gridStart.getDate() + i));
  const monthLabel = cursor.toLocaleDateString(undefined, { month: "long", year: "numeric" });
  const evMatch = (e) => filter === "all" || (e.memberIds || []).includes(filter);
  const avMatch = (a) => filter === "all" || a.memberId === filter;
  const move = (n) => setCursor(new Date(y, mo + n, 1));
  const clientConversion = (e) => {
    if (!e.clientId) return null;
    const c = data.clients.find((x) => x.id === e.clientId);
    if (!c || !c.timezone || c.timezone === firmTz) return null;
    const conv = convertTime(e.date, e.time, firmTz, c.timezone);
    if (!conv) return null;
    return `${fmt12(conv.hhmm)} ${tzLabel(c.timezone).match(/\(([^)]+)\)/)?.[1] || c.timezone}${conv.dayShift !== 0 ? (conv.dayShift > 0 ? " (+1d)" : " (-1d)") : ""}`;
  };
  return (
    <>
      <PageHead title="Calendar" sub="One person or the whole team. Block availability and set events to repeat." action={<div className="cd-head-actions"><button className="cd-btn ghost" onClick={() => setModal({ type: "avail", payload: null })}><Ban size={15} />Block time</button><button className="cd-btn primary" onClick={() => setModal({ type: "event", payload: null })}><Plus size={16} />New event</button></div>} />
      <div className="cd-cal-bar">
        <div className="cd-cal-nav"><button className="cd-iconbtn" onClick={() => move(-1)}><ChevronLeft size={18} /></button><span className="cd-cal-month">{monthLabel}</span><button className="cd-iconbtn" onClick={() => move(1)}><ChevronRight size={18} /></button><button className="cd-btn ghost sm" onClick={() => setCursor(new Date(today.getFullYear(), today.getMonth(), 1))}>Today</button></div>
        <div className="cd-cal-bar-right">
          <label className="cd-tzpick"><Globe size={13} />Firm time zone <select value={firmTz} onChange={(e) => update({ settings: { ...data.settings, firmTimezone: e.target.value } })}>{TIMEZONES.map((z) => <option key={z.id} value={z.id}>{z.label}</option>)}</select></label>
          <select className="cd-cal-filter" value={filter} onChange={(e) => setFilter(e.target.value)}><option value="all">Team (all)</option>{data.team.map((m) => <option key={m.id} value={m.id}>{m.name}</option>)}</select>
        </div>
      </div>
      <div className="cd-cal-grid">
        {["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"].map((d) => <div key={d} className="cd-cal-dow">{d}</div>)}
        {cells.map((d, i) => { const iso = isoOf(d); const inMonth = d.getMonth() === mo; const isToday = iso === todayIso; const evs = data.events.filter((e) => e.date === iso && evMatch(e)); const avs = data.availability.filter((a) => a.start <= iso && a.end >= iso && avMatch(a)); return (
          <div key={i} className={"cd-cal-cell" + (inMonth ? "" : " off") + (isToday ? " today" : "")} onClick={() => setModal({ type: "event", payload: { _date: iso } })}>
            <div className="cd-cal-num">{d.getDate()}</div>
            {avs.map((a) => <div key={a.id} className={"cd-cal-av " + a.type} onClick={(ev) => { ev.stopPropagation(); setModal({ type: "avail", payload: a }); }} title={member(a.memberId)?.name + " — " + a.note}>{a.type === "out" ? <Ban size={10} /> : <Clock size={10} />}{member(a.memberId)?.name.split(" ")[0]}: {a.note || (a.type === "out" ? "Out" : "Busy")}</div>)}
            {evs.slice(0, 3).map((e) => { const conv = clientConversion(e); return <div key={e.id} className="cd-cal-ev" onClick={(ev) => { ev.stopPropagation(); setModal({ type: "event", payload: e }); }} title={e.title}><b>{fmt12(e.time)}</b> {e.title}{e.recurrence && e.recurrence !== "none" && <Repeat size={9} />}{conv && <span className="cd-cal-ev-tz">{conv} client</span>}</div>; })}
            {evs.length > 3 && <div className="cd-cal-more">+{evs.length - 3} more</div>}
          </div>
        ); })}
      </div>
      <p className="cd-cal-foot">Click any day to add an event. Switch the dropdown to a person for their calendar, or “Team (all)” for the joint view. Times are shown in your firm time zone; client-zone conversions appear automatically when a client's zone differs.</p>
    </>
  );
}

  const byClient = byGroup((a) => data.clients.find((c) => c.id === a.clientId)?.name || "—");

  useEffect(() => { if (!playing) return; const t = setTimeout(() => { if (i < steps.length - 1) setTour(i + 1); else setTour(-1); }, 4400); return () => clearTimeout(t); }, [i, playing]);
  useEffect(() => { if (step) {/* view set by parent via TOUR; map */ } }, [i]);
  // sync parent view to filtered step
  useEffect(() => { /* parent listens to tour index against TOUR; ensure same order */ }, []);
  return (
    <div className="cd-tour">
      <div className="cd-tour-top"><span className="cd-tour-badge">Tour · {i + 1}/{steps.length}</span><button className="cd-iconbtn" onClick={() => setTour(-1)}><X size={16} /></button></div>

          <Field label="Monthly capacity (h)"><input type="number" min="0" value={f.capacity} onChange={(e) => set("capacity", Number(e.target.value))} /></Field>
          {showRate
            ? <Field label="Billing rate ($/hr)" hint="Private to this person & admins"><input type="number" min="0" value={f.rate || 0} onChange={(e) => set("rate", Number(e.target.value))} /></Field>
            : <Field label="Billing rate"><div className="cd-ratehidden"><Lock size={12} />Private to them &amp; admins</div></Field>}
        </div>
        <Field label="Skills"><div className="cd-people compact">{SKILLS.map((sk) => <label key={sk} className={"cd-tagcheck" + ((f.skills || []).includes(sk) ? " on" : "")}><input type="checkbox" checked={(f.skills || []).includes(sk)} onChange={() => toggleSkill(sk)} />{sk}</label>)}</div></Field>
      </div>
      <div className="cd-modal-foot"><div className="cd-foot-right"><button className="cd-btn ghost" onClick={onClose}>Cancel</button><button className="cd-btn primary" disabled={!f.name.trim()} onClick={() => onSave(f)}>{m ? "Save" : "Add"}</button></div></div>

  );
}

function LaunchForm({ t, data, onSave, onClose }) {
  const total = t.tasks.reduce((s, [, h]) => s + h, 0);
  const [f, setF] = useState({ clientId: t.internal ? null : (data.clients[0]?.id || ""), assigneeId: "", due: dayOffset(21) });
  const set = (k, v) => setF((s) => ({ ...s, [k]: v }));
  const launch = () => { const ids = f.assigneeId ? [f.assigneeId] : []; const monthly = Math.max(6, Math.round(total / 1.5)); const alloc = {}; ids.forEach((id) => (alloc[id] = monthly)); onSave({ id: uid(), title: t.name + " engagement", clientId: t.internal ? null : f.clientId, internal: !!t.internal, serviceLine: t.serviceLine, assigneeIds: ids, alloc, weekly: ids.length ? monthly : 0, status: "Not started", due: f.due, budget: total, logged: 0, confidential: !!t.confidential, billable: t.internal ? "nonbillable" : "unset", approval: null, reviewerId: null, comments: [], links: [], loggedByMonth: {}, tasks: t.tasks.map(([l]) => ({ id: uid(), label: l, done: false, assigneeId: null })), notes: "" }); };
  return (
    <>
      <ModalHead title={"Start: " + t.name} onClose={onClose} />
      <div className="cd-form"><p className="cd-launch-note">Creates a {t.internal ? "marketing " : ""}engagement for <b>{t.serviceLine}</b>, budgeted at <b>{total}h</b> across {t.tasks.length} standard tasks{t.confidential ? ", marked confidential" : ""}.</p><div className="cd-form-row">{!t.internal && <Field label="Client"><select value={f.clientId || ""} onChange={(e) => set("clientId", e.target.value)}>{data.clients.map((c) => <option key={c.id} value={c.id}>{c.name}</option>)}</select></Field>}<Field label="Lead"><select value={f.assigneeId} onChange={(e) => set("assigneeId", e.target.value)}><option value="">Unassigned</option>{data.team.map((m) => <option key={m.id} value={m.id}>{m.name}</option>)}</select></Field></div><Field label="Target due date"><input type="date" value={f.due} onChange={(e) => set("due", e.target.value)} /></Field></div>
      <div className="cd-modal-foot"><div className="cd-foot-right"><button className="cd-btn ghost" onClick={onClose}>Cancel</button><button className="cd-btn primary" onClick={launch}>Create engagement</button></div></div>
    </>
  );
}

function DataModal({ data, onImport, onResetFresh, onRestore, onClose }) {
  const [status, setStatus] = useState(null);
  const [confirming, setConfirming] = useState(null);
  const fileRef = React.useRef(null);
  const exportNow = () => {
    try {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a"); a.href = url; a.download = `cadence-backup-${todayIso}.json`;
      document.body.appendChild(a); a.click(); a.remove(); setTimeout(() => URL.revokeObjectURL(url), 1000);
      setStatus({ ok: true, msg: "Backup downloaded. If nothing downloaded, open Cadence in its own browser tab." });
    } catch (e) { setStatus({ ok: false, msg: "Couldn't export here — open Cadence in its own browser tab and try again." }); }
  };
  const onFile = (e) => {
    const file = e.target.files && e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { try { const obj = JSON.parse(reader.result); if (!obj || !Array.isArray(obj.assignments)) throw new Error("bad"); onImport(obj); setStatus({ ok: true, msg: "Backup loaded successfully." }); } catch (err) { setStatus({ ok: false, msg: "That file isn't a valid Cadence backup." }); } };
    reader.onerror = () => setStatus({ ok: false, msg: "Couldn't read that file." });
    reader.readAsText(file); e.target.value = "";
  };
  return (
    <>
      <ModalHead title="Data & backup" onClose={onClose} />
      <div className="cd-form">
        <p className="cd-data-note">This prototype keeps your data in <b>this browser only</b>. Export a backup regularly — and always before clearing your cache or switching devices.</p>
        <div className="cd-data-actions">
          <button className="cd-data-btn" onClick={exportNow}><Download size={16} /><div><b>Export backup</b><span>Download everything as a .json file</span></div></button>
          <button className="cd-data-btn" onClick={() => fileRef.current && fileRef.current.click()}><Upload size={16} /><div><b>Import backup</b><span>Restore from a .json file</span></div></button>
          <input ref={fileRef} type="file" accept="application/json,.json" style={{ display: "none" }} onChange={onFile} />
          <button className="cd-data-btn warn" onClick={() => setConfirming({ msg: "Clear all clients, assignments, events, availability, channels, notifications, and payout history? Your team, templates, and firm setup are kept.", run: () => { onResetFresh(); setStatus({ ok: true, msg: "Started fresh — your team and templates were kept." }); } })}><RotateCcw size={16} /><div><b>Start fresh</b><span>Clear records, keep your setup</span></div></button>
          <button className="cd-data-btn" onClick={() => setConfirming({ msg: "Replace everything with the sample demo data?", run: () => { onRestore(); setStatus({ ok: true, msg: "Sample data restored." }); } })}><Sparkles size={16} /><div><b>Restore sample data</b><span>Reload the demo content</span></div></button>
        </div>
        {confirming && <div className="cd-confirm"><span>{confirming.msg}</span><div className="cd-confirm-btns"><button className="cd-btn ghost sm" onClick={() => setConfirming(null)}>Cancel</button><button className="cd-btn danger sm" onClick={() => { confirming.run(); setConfirming(null); }}>Yes, continue</button></div></div>}
        {status && <div className={"cd-data-status " + (status.ok ? "ok" : "err")}>{status.msg}</div>}
      </div>
      <div className="cd-modal-foot"><div className="cd-foot-right"><button className="cd-btn primary" onClick={onClose}>Done</button></div></div>
    </>
  );
}

.cd-band-sub{font-size:11.5px;color:var(--muted);margin-top:6px;}
.cd-pto{color:var(--plum);font-weight:550;margin-left:4px;}
.cd-skilltags{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px;}
.cd-skilltag{font-size:10.5px;font-weight:550;padding:2px 7px;border-radius:5px;background:#EEF1ED;color:#52605A;}
.cd-skilltag.on{background:var(--brand-lt);color:var(--brand-d);}
.cd-overflag{display:flex;align-items:center;gap:7px;margin-top:10px;font-size:12px;font-weight:550;color:var(--alert);background:var(--alert-lt);padding:7px 11px;border-radius:8px;}
.cd-band-items{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px;}
.cd-chip{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;background:#F1F4F0;border:1px solid var(--border);border-radius:7px;padding:4px 9px;cursor:pointer;font-family:inherit;color:var(--ink);}
.cd-chip:hover{background:var(--brand-lt);border-color:var(--brand);}
.cd-chip b{color:var(--brand-d);}
.cd-fin-row{display:grid;grid-template-columns:130px 1fr 78px;align-items:center;gap:11px;padding:6px 0;}
.cd-fin-label{font-size:12.5px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cd-fin-bar{height:18px;background:#EDF0EC;border-radius:5px;overflow:hidden;}
.cd-fin-fill{height:100%;background:var(--brand);border-radius:5px;}
.cd-fin-fill.alt{background:var(--plum);}
.cd-fin-fill.hrs{background:var(--amber);}
.cd-fin-val{font-size:12.5px;font-weight:600;text-align:right;color:var(--brand-d);}
.cd-h2-ic{margin-right:6px;vertical-align:-2px;color:var(--brand-d);}
.cd-pay-card{border:1px solid var(--border);border-radius:11px;margin-bottom:9px;overflow:hidden;}
.cd-pay-top{display:flex;align-items:center;gap:14px;padding:12px 14px;cursor:pointer;}
.cd-pay-top:hover{background:#F8FAF7;}
.cd-pay-name{font-size:13.5px;font-weight:600;min-width:140px;}
.cd-pay-name span{display:block;font-size:11px;font-weight:400;color:var(--muted);}
.cd-pay-figures{display:flex;gap:22px;flex:1;}
.cd-pay-figures div{font-size:11px;color:var(--muted);}
.cd-pay-figures b{display:block;font-size:13px;color:var(--brand-d);font-weight:700;}
.cd-pay-chev{color:var(--muted);transition:transform .15s;flex-shrink:0;}
.cd-pay-chev.open{transform:rotate(90deg);}
.cd-pay-detail{padding:4px 14px 14px;border-top:1px solid #EFF2EE;}
.cd-pay-rate{font-size:11.5px;color:var(--muted);margin:8px 0 6px;}
.cd-pay-item{display:flex;align-items:center;gap:9px;padding:7px 0;border-top:1px solid #F2F5F1;cursor:pointer;}
.cd-pay-item:first-of-type{border-top:none;}
.cd-pay-item-ic{width:22px;height:22px;border-radius:50%;background:#EEF1ED;color:#52605A;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cd-pay-item-label{font-size:12.5px;font-weight:550;}
.cd-pay-item-sub{font-size:11px;color:var(--muted);}
.cd-pay-item-main{flex:1;min-width:0;}
.cd-pay-item-hrs{font-size:11.5px;color:var(--muted);white-space:nowrap;}
.cd-pay-actions{margin-top:10px;}
.cd-payout-hist{margin-top:12px;border-top:1px solid #EFF2EE;padding-top:9px;}
.cd-payout-hist-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-bottom:6px;}
.cd-payout-row{display:grid;grid-template-columns:60px 50px 70px 1fr auto;align-items:center;gap:8px;font-size:11.5px;color:#41504A;padding:4px 0;}
.cd-payout-date{color:var(--muted);}
.cd-mypay-stats{display:flex;gap:12px;}
.cd-mypay-stat{flex:1;background:var(--brand-lt);border-radius:10px;padding:12px 14px;}
.cd-mypay-stat span{display:block;font-size:11px;color:var(--brand-d);}
.cd-mypay-stat b{display:block;font-size:19px;font-family:'Fraunces',serif;color:var(--brand-d);}
.cd-mypay-stat i{font-style:normal;font-size:12px;color:var(--brand-d);}
.cd-contract-block{margin:6px 0 4px;}
.cd-contract-line{font-size:11px;color:var(--muted);margin-top:4px;}
.cd-contract-line.over{color:var(--alert);font-weight:600;}
.cd-contract-over{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--alert);margin-top:3px;}
.cd-tzpick{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);}
.cd-tzpick select{padding:6px 8px;font-size:12px;}
.cd-cal-bar-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.cd-cal-ev-tz{display:block;font-size:9px;color:var(--muted);}
.cd-tz-preview{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--brand-d);background:var(--brand-lt);padding:9px 12px;border-radius:9px;}
.cd-client-hours{font-size:11.5px;color:var(--muted);margin:2px 0;}
.cd-reviewer-row{display:flex;align-items:center;gap:9px;}
.cd-reviewer-row select{flex:1;}
.cd-link-row{display:grid;grid-template-columns:1fr 1.4fr auto auto;gap:6px;margin-bottom:6px;align-items:center;}
.cd-link-row input{padding:6px 8px;font-size:12px;}
.cd-cl-assignee{width:auto;flex-shrink:0;padding:5px 7px;font-size:11.5px;border-radius:6px;}
.cd-activity{border:1px solid var(--border);border-radius:9px;padding:11px;display:flex;flex-direction:column;gap:9px;}
.cd-comment{border-bottom:1px solid #F0F3EF;padding-bottom:8px;}
.cd-comment-meta{display:flex;justify-content:space-between;font-size:11.5px;color:var(--muted);margin-bottom:2px;}
.cd-comment-meta b{color:var(--ink);font-weight:600;}
.cd-comment-text{font-size:12.5px;line-height:1.45;}
.cd-comment-tags{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--brand-d);margin-top:3px;}
.cd-comment-compose{display:flex;flex-direction:column;gap:7px;padding-top:4px;}
.cd-comment-input{display:flex;gap:7px;}
.cd-comment-input input{flex:1;}
.cd-cal-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px;}
.cd-cal-nav{display:flex;align-items:center;gap:8px;}
.cd-cal-month{font-family:'Fraunces',serif;font-size:18px;font-weight:500;min-width:160px;text-align:center;}
.cd-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.cd-cal-dow{background:#F7F9F6;padding:8px 6px;font-size:11px;font-weight:600;color:var(--muted);text-align:center;text-transform:uppercase;letter-spacing:.5px;}
.cd-cal-cell{background:var(--surface);min-height:96px;padding:5px 6px;cursor:pointer;display:flex;flex-direction:column;gap:3px;}
.cd-cal-cell:hover{background:#FAFCF9;}
.cd-cal-cell.off{background:#FAFBFA;}
.cd-cal-cell.off .cd-cal-num{color:#B9C2BC;}
.cd-cal-cell.today{box-shadow:inset 0 0 0 2px var(--brand);}
.cd-cal-num{font-size:12px;font-weight:600;}
.cd-cal-ev{font-size:10.5px;background:var(--brand-lt);color:var(--brand-d);border-radius:5px;padding:2px 5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;display:flex;align-items:center;gap:3px;}
.cd-cal-av{display:flex;align-items:center;gap:3px;font-size:10px;border-radius:5px;padding:2px 5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;}
.cd-cal-av.out{background:var(--plum-lt);color:var(--plum);}
.cd-cal-av.busy{background:var(--amber-lt);color:var(--amber);}
.cd-cal-more{font-size:10px;color:var(--muted);padding-left:3px;}
.cd-cal-foot,.cd-chan-note{font-size:11.5px;color:var(--muted);margin-top:10px;font-style:italic;}
.cd-inline-field{display:flex;align-items:center;gap:10px;margin-bottom:10px;font-size:12.5px;color:#41504A;}
.cd-inline-field span{min-width:78px;font-weight:600;}
.cd-inline-field input{flex:1;border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-family:inherit;font-size:13px;}
.cd-chan-row{display:flex;align-items:center;gap:11px;padding:9px 0;border-top:1px solid #EFF2EE;}
.cd-chan-row:first-of-type{border-top:none;}
.cd-chan-ic{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;background:var(--brand-lt);color:var(--brand-d);flex-shrink:0;}
.cd-chan-ic.linkedin{background:#E7F0F7;color:#0A66C2;}.cd-chan-ic.instagram{background:#FBE9F0;color:#C13584;}.cd-chan-ic.x{background:#ECEEF0;color:#111;}.cd-chan-ic.facebook{background:#E7EEFB;color:#1877F2;}.cd-chan-ic.youtube{background:#FBE5E5;color:#C4302B;}
.cd-chan-handle{font-size:13px;font-weight:600;}
.cd-chan-meta{font-size:11.5px;color:var(--muted);}
.cd-chan-main{flex:1;min-width:0;}
.cd-chan-note{margin-top:12px;}
.cd-client-grid,.cd-tpl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;}
.cd-client-card{margin-bottom:0;cursor:pointer;}
.cd-client-card:hover{border-color:var(--brand);}
.cd-client-name{font-size:15px;font-weight:600;display:flex;align-items:center;gap:7px;}
.cd-client-count{font-size:12.5px;color:var(--muted);margin:4px 0 2px;}
.cd-client-contact{font-size:11.5px;color:var(--muted);}
.cd-client-renew{font-size:11.5px;color:var(--muted);margin-top:5px;}
.cd-client-renew.soon{color:var(--amber);font-weight:600;}
.cd-client-lines{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px;}
.cd-tpl-card{margin-bottom:0;display:flex;flex-direction:column;}
.cd-tpl-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.cd-tpl-name{font-size:15px;font-weight:600;display:flex;align-items:center;gap:6px;}
.cd-tpl-line{font-size:12px;color:var(--muted);}
.cd-tpl-hrs{font-family:'Fraunces',serif;font-size:18px;font-weight:600;color:var(--brand-d);}
.cd-tpl-tasks{list-style:none;margin-bottom:14px;flex:1;}
.cd-tpl-tasks li{display:flex;align-items:center;gap:8px;font-size:12.5px;padding:4px 0;color:#41504A;border-bottom:1px solid #F2F5F1;}
.cd-tpl-tasks li svg{color:var(--brand);flex-shrink:0;}
.cd-tpl-tasks li span{margin-left:auto;color:var(--muted);font-size:11.5px;}
.cd-overlay{position:fixed;inset:0;background:rgba(26,40,35,.42);display:flex;align-items:flex-start;justify-content:center;padding:40px 18px;z-index:50;overflow-y:auto;backdrop-filter:blur(2px);}
.cd-modal{background:var(--surface);border-radius:16px;width:100%;max-width:580px;box-shadow:0 24px 60px rgba(26,40,35,.25);overflow:hidden;}
.cd-modal-h{display:flex;justify-content:space-between;align-items:center;padding:18px 22px;border-bottom:1px solid var(--border);}
.cd-form{padding:20px 22px;display:flex;flex-direction:column;gap:14px;max-height:66vh;overflow-y:auto;}
.cd-form-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.cd-form-row:has(.cd-field:only-child){grid-template-columns:1fr;}
.cd-field{display:flex;flex-direction:column;gap:5px;}
.cd-flabel{font-size:12px;font-weight:600;color:#41504A;}
.cd-fhint{font-size:10.5px;color:var(--muted);}
.cd-form input,.cd-form select,.cd-form textarea{width:100%;}
.cd-form textarea{resize:vertical;}
.cd-people{display:flex;flex-direction:column;gap:4px;border:1px solid var(--border);border-radius:9px;padding:8px;}
.cd-people.compact{flex-direction:row;flex-wrap:wrap;border:none;padding:0;}
.cd-person{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:4px 6px;border-radius:7px;font-size:13px;}
.cd-person.on{background:var(--brand-lt);}
.cd-person label{display:flex;align-items:center;gap:8px;cursor:pointer;}
.cd-person input[type=checkbox]{accent-color:var(--brand);}
.cd-person-hrs{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--brand-d);}
.cd-person-hrs input{width:48px;padding:3px 6px;border:1px solid var(--border);border-radius:6px;font-size:12px;text-align:center;}
.cd-check{display:flex;align-items:center;gap:8px;font-size:12.5px;color:#41504A;cursor:pointer;padding:9px 11px;background:var(--plum-lt);border-radius:9px;}
.cd-check.sub{background:#F2F5F1;}
.cd-check.alt{background:var(--amber-lt);}
.cd-check input{width:auto;accent-color:var(--plum);}
.cd-contacts{border:1px solid var(--border);border-radius:9px;padding:11px;}
.cd-contacts-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.cd-contact-row{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:6px;margin-bottom:6px;}
.cd-contact-row input{padding:6px 8px;font-size:12px;}
.cd-launch-note{font-size:13px;color:#41504A;background:var(--brand-lt);padding:11px 13px;border-radius:9px;}
.cd-tasks-chip{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px;background:#EEF1ED;color:#52605A;}
.cd-tasks-chip svg{color:var(--brand);}
.cd-tasks-chip.reviewer{background:var(--amber-lt);color:var(--amber);}
.cd-tasks-chip.reviewer svg{color:var(--amber);}
.cd-checklist{display:flex;flex-direction:column;gap:6px;border:1px solid var(--border);border-radius:9px;padding:9px;}
.cd-cl-row{display:flex;align-items:center;gap:8px;}
.cd-cl-row input[type=checkbox]{accent-color:var(--brand);flex-shrink:0;}
.cd-cl-text{flex:1;border:1px solid var(--border);border-radius:7px;padding:6px 9px;font-size:13px;font-family:inherit;}
.cd-cl-text.done{text-decoration:line-through;color:var(--muted);}
.cd-addstep{align-self:flex-start;padding:2px 0;}
.cd-data-note{font-size:13px;color:#41504A;background:var(--amber-lt);padding:11px 13px;border-radius:9px;line-height:1.5;}
.cd-data-actions{display:flex;flex-direction:column;gap:8px;}
.cd-data-btn{display:flex;align-items:center;gap:12px;text-align:left;padding:12px 14px;border:1px solid var(--border);border-radius:10px;background:var(--surface);cursor:pointer;font-family:inherit;color:var(--ink);}
.cd-data-btn:hover{background:#F4F7F3;border-color:var(--brand);}
.cd-data-btn svg{color:var(--brand-d);flex-shrink:0;}
.cd-data-btn b{display:block;font-size:13px;font-weight:600;}
.cd-data-btn span{display:block;font-size:11.5px;color:var(--muted);}
.cd-data-btn.warn svg{color:var(--alert);}
.cd-data-btn.warn:hover{border-color:var(--alert);}
.cd-confirm{background:var(--alert-lt);border-radius:9px;padding:11px 13px;font-size:12.5px;color:var(--alert);display:flex;flex-direction:column;gap:9px;}
.cd-confirm-btns{display:flex;gap:8px;justify-content:flex-end;}
.cd-data-status{font-size:12.5px;padding:9px 12px;border-radius:8px;}
.cd-data-status.ok{background:#E2F0E8;color:var(--ok);}
.cd-data-status.err{background:var(--alert-lt);color:var(--alert);}
.cd-modal-foot{display:flex;justify-content:space-between;align-items:center;padding:15px 22px;border-top:1px solid var(--border);background:#FBFCFA;}
.cd-foot-right{display:flex;gap:9px;margin-left:auto;}
.cd-foot{font-size:11.5px;color:var(--muted);margin-top:26px;padding-top:16px;border-top:1px solid var(--border);line-height:1.5;}
.cd-tour{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);width:380px;max-width:calc(100vw - 32px);background:var(--ink);color:#fff;border-radius:14px;padding:16px 18px;z-index:60;box-shadow:0 18px 50px rgba(0,0,0,.3);}
.cd-tour-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.cd-tour-top .cd-iconbtn{color:#9FB0A8;}
.cd-tour-badge{font-size:11px;font-weight:600;color:#8FE3C4;letter-spacing:.4px;text-transform:uppercase;}
.cd-tour-title{font-family:'Fraunces',serif;font-size:18px;font-weight:500;margin-bottom:4px;}
.cd-tour-body{font-size:13px;color:#CDD7D2;line-height:1.5;margin-bottom:12px;}
.cd-tour-dots{display:flex;gap:5px;margin-bottom:12px;}
.cd-tour-dots i{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.25);}
.cd-tour-dots i.on{background:#8FE3C4;}
.cd-tour-ctrl{display:flex;align-items:center;gap:8px;}
.cd-tour-ctrl .cd-iconbtn{color:#CDD7D2;margin:0 auto 0 4px;}
.cd-tour-ctrl .cd-btn.ghost{background:transparent;border-color:rgba(255,255,255,.2);color:#fff;}
@media(max-width:960px){
  .cd-root{flex-direction:column;}
  .cd-side{width:100%;height:auto;position:relative;flex-direction:row;align-items:center;padding:12px 16px;overflow-x:auto;}
  .cd-brand{padding:0 14px 0 0;}.cd-firm{display:none;}
  .cd-nav{flex-direction:row;flex:none;gap:2px;}
  .cd-navbtn span{display:none;}.cd-navbtn{padding:9px;}
  .cd-side-foot{flex-direction:row;margin-left:auto;}
  .cd-roleswitch{max-width:150px;}
  .cd-main{padding:22px 18px 40px;}
  .cd-stats{grid-template-columns:1fr 1fr;}
  .cd-grid2,.cd-alist{grid-template-columns:1fr;}
  .cd-h1{font-size:23px;}.cd-cal-cell{min-height:70px;}
  .cd-form-row{grid-template-columns:1fr 1fr;}
}
@media(max-width:480px){.cd-form-row{grid-template-columns:1fr;}.cd-cal-month{min-width:120px;font-size:15px;}.cd-contact-row{grid-template-columns:1fr 1fr;}}
`;


/* ---------------- mount ---------------- */
const _root = document.getElementById("root");
ReactDOM.createRoot(_root).render(React.createElement(App));

</script>
</body>
</html>
